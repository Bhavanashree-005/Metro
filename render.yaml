services:
  - type: web
    name: metroimpact-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd chennai_metro_did/server && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
    autoDeploy: true
